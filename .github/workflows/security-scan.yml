name: Security Vulnerability Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: rct_app
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: rct-education-web

      - name: Import Database Schema
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root --silent && break
            echo "Waiting for MySQL database connection..."
            sleep 1
          done
          mysql -h 127.0.0.1 -u root rct_app < rct-education-web/backend/config/schema_rct_app.sql

      - name: Start Local PHP Web Server
        run: |
          DB_HOST=127.0.0.1 php -S 127.0.0.1:8000 &
          sleep 3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rct-education-web/frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd rct-education-web/frontend
          npm ci

      - name: Run NPM Audit (Dependency Vulnerability Scan)
        run: |
          cd rct-education-web/frontend
          npm audit --audit-level=high || true

      - name: Run Frontend Linter (ESLint)
        run: |
          cd rct-education-web/frontend
          npm run lint || true

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, json

      - name: Validate Backend PHP Syntax
        run: |
          find rct-education-web/backend/ -type f -name "*.php" -exec php -l {} \;

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Run Backend Security & QA Tests
        run: |
          cd rct-education-web/backend/automated_tests
          python run_tests.py
        env:
          BASE_URL: "http://127.0.0.1:8000/rct-education-web"
          DB_HOST: "127.0.0.1"

      - name: Upload QA Test Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-qa-report-excel
          path: rct-education-web/backend/automated_tests/test_cases.xlsx
          if-no-files-found: warn

      - name: Upload QA Test CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-qa-report-csv
          path: rct-education-web/backend/automated_tests/test_cases.csv
          if-no-files-found: warn
