name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-commit-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend Website
        run: |
          cd frontend
          npm run build

      - name: Copy Build Files to Root
        run: |
          cp -rf frontend/dist/* .

      - name: Commit and Push Build Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the built assets, index.html, and favicons/icons
          git add index.html assets/ favicon.svg icons.svg
          
          # Commit and push only if changes exist
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(deploy): automatically build and update static website files in root [skip ci]"
            git push origin main
          else
            echo "No changes in built files to commit."
          fi
