name: Selenium Login E2E Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: rct_app
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: rct-education-web

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli

      - name: Import Database Schema
        run: |
          mysql -h 127.0.0.1 -u root rct_app < rct-education-web/backend/config/schema_rct_app.sql

      - name: Start PHP Local Web Server
        run: |
          DB_HOST=127.0.0.1 php -S 127.0.0.1:8080 &
          sleep 3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rct-education-web/frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd rct-education-web/frontend
          npm ci

      - name: Build Frontend
        run: |
          cd rct-education-web/frontend
          npm run build

      - name: Run Complete Selenium E2E Tests
        env:
          HEADLESS: "true"
          TEST_URL: "http://127.0.0.1:8080/rct-education-web/frontend/index.php"
        run: |
          cd rct-education-web/frontend
          npm run test:e2e

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install openpyxl

      - name: Generate QA E2E Test Reports
        run: |
          cd rct-education-web/frontend/selenium-tests
          python generate_excel_report.py

      - name: Upload E2E Test Report Excel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Report
          path: |
            rct-education-web/frontend/selenium-tests/e2e_test_report.xlsx
            rct-education-web/frontend/selenium-tests/e2e_test_report_updated.xlsx
          if-no-files-found: ignore
