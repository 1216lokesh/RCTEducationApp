name: Selenium Login E2E Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: rct_app
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: rct-education-web

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli

      - name: Import Database Schema
        run: |
          mysql -h 127.0.0.1 -u root rct_app < rct-education-web/backend/config/schema_rct_app.sql

      - name: Start PHP Local Web Server
        run: |
          DB_HOST=127.0.0.1 php -S 127.0.0.1:8080 &
          sleep 3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rct-education-web/frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd rct-education-web/frontend
          npm ci

      - name: Build Frontend
        run: |
          cd rct-education-web/frontend
          npm run build

      - name: Run E2E Login Tests
        env:
          HEADLESS: "true"
          TEST_URL: "http://127.0.0.1:8080/rct-education-web/frontend/index.php#/login"
        run: |
          cd rct-education-web/frontend
          npm run login
