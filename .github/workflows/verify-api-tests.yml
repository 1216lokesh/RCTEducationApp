name: API Integration and QA Test Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-api-qa-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: rct_app
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, json

      - name: Import Database Schema
        run: |
          mysql -h 127.0.0.1 -u root rct_app < backend/config/schema_rct_app.sql

      - name: Start Local PHP Web Server
        run: |
          php -S 127.0.0.1:8000 -t . &
          sleep 3
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: ""
          DB_NAME: rct_app

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl selenium

      - name: Install Chrome and Webdriver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Comprehensive Security & QA Tests
        run: |
          cd backend/automated_tests
          python run_comprehensive_tests.py
        env:
          BASE_URL: "http://127.0.0.1:8000"

      - name: Upload Comprehensive Test Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-qa-report-excel
          path: backend/automated_tests/comprehensive_test_cases.xlsx
          if-no-files-found: warn

      - name: Upload Comprehensive Test CSV Report
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-qa-report-csv
          path: backend/automated_tests/comprehensive_test_cases.csv
          if-no-files-found: warn
