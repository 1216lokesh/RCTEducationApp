name: Baseline & Load Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  load-testing:
    name: Execute Baseline & Load Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: rct_app
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: rct-education-web

      - name: Import Database Schema
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root --silent && break
            echo "Waiting for MySQL database connection..."
            sleep 1
          done
          mysql -h 127.0.0.1 -u root rct_app < rct-education-web/backend/config/schema_rct_app.sql

      - name: Start Local PHP Web Server
        run: |
          PHP_CLI_SERVER_WORKERS=20 DB_HOST=127.0.0.1 php -S 127.0.0.1:8000 &
          sleep 3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Run Baseline/Load Testing
        run: |
          cd rct-education-web/backend/automated_tests
          python run_load_tests.py
        env:
          BASE_URL: "http://127.0.0.1:8000/rct-education-web"
          DB_HOST: "127.0.0.1"

      - name: Upload Load Test Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report-excel
          path: rct-education-web/backend/automated_tests/load_test_report.xlsx
          if-no-files-found: warn

      - name: Publish Load Test Summary
        if: always()
        run: |
          if [ -f rct-education-web/backend/automated_tests/load_test_summary.md ]; then
            cat rct-education-web/backend/automated_tests/load_test_summary.md >> $GITHUB_STEP_SUMMARY
          fi
